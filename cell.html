<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cell Biology — Interactive Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #04080f;
      --card:    rgba(5,14,32,0.90);
      --blue:    #90cdf4;
      --blue-d:  #4a90e2;
      --green:   #68d391;
      --green-d: #276749;
      --yellow:  #f6e05e;
      --orange:  #f6ad55;
      --pink:    #f687b3;
      --purple:  #b794f4;
      --dim:     #8ba3bb;
      --teal:    #4fd1c5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: #f0f0f0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body.bangla { font-family: 'Noto Serif Bengali', sans-serif; }

    #bgLayer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 15% 40%, rgba(104,211,145,0.055) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 60%, rgba(144,205,244,0.04) 0%, transparent 50%),
        linear-gradient(145deg, rgba(4,18,12,0.97), rgba(4,12,26,0.98));
    }
    #bgGrid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(104,211,145,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(104,211,145,0.018) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .wrapper { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* TOP BAR */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(104,211,145,0.12);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      text-decoration: none; color: var(--dim);
      background: rgba(0,0,0,0.4); padding: 0.4rem 0.9rem; border-radius: 6px;
      font-size: 0.85rem; border: 1px solid rgba(104,211,145,0.18);
      transition: all 0.2s; font-family: 'Share Tech Mono', monospace;
    }
    .back-btn:hover { color: var(--green); border-color: var(--green); background: rgba(104,211,145,0.1); }
    .page-title {
      font-family: 'Exo 2', sans-serif; font-size: 1.35rem; font-weight: 900; font-style: italic;
      color: var(--green); text-shadow: 0 0 22px rgba(104,211,145,0.35);
    }
    .topbar-right { display: flex; gap: 0.6rem; align-items: center; }
    .toggle-btn, #languageToggle {
      background: rgba(0,0,0,0.5); color: white; padding: 0.4rem 0.9rem;
      border: 1px solid rgba(104,211,145,0.28); border-radius: 20px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer;
      font-family: 'Share Tech Mono', monospace; transition: all 0.2s; letter-spacing: 0.04em;
    }
    .toggle-btn:hover, #languageToggle:hover { background: var(--green-d); border-color: var(--green); }
    .toggle-btn.animal { border-color: rgba(144,205,244,0.4); }
    .toggle-btn.animal:hover { background: rgba(74,144,226,0.3); border-color: var(--blue); }

    /* MAIN LAYOUT */
    .main {
      display: flex; gap: 0; flex: 1;
      padding: 0; overflow: hidden;
    }

    /* INFO SIDEBAR */
    #infoPanel {
      width: 300px; min-width: 300px;
      background: var(--card);
      border-right: 1px solid rgba(104,211,145,0.12);
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
    }
    #infoPanel::-webkit-scrollbar { width: 3px; }
    #infoPanel::-webkit-scrollbar-thumb { background: rgba(104,211,145,0.2); border-radius: 2px; }

    .info-header {
      padding: 1rem 1.2rem 0.7rem;
      border-bottom: 1px solid rgba(104,211,145,0.1);
      background: rgba(0,0,0,0.3);
    }
    .info-idle {
      padding: 1.2rem;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .idle-hint {
      font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(104,211,145,0.4); text-align: center; margin-bottom: 0.3rem;
    }

    /* Organelle list in idle state */
    .organelle-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .org-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.4rem 0.6rem; border-radius: 6px;
      border: 1px solid rgba(104,211,145,0.08);
      background: rgba(0,0,0,0.25);
      cursor: pointer; transition: all 0.18s;
      font-size: 0.8rem;
    }
    .org-item:hover { background: rgba(104,211,145,0.08); border-color: rgba(104,211,145,0.25); }
    .org-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .org-name { color: #d0e8d8; font-weight: 500; }
    .org-name-bn { color: rgba(208,232,216,0.7); font-size: 0.72rem; }

    /* Active info card */
    #infoCard {
      padding: 1.2rem; display: none; flex-direction: column; gap: 0.7rem;
    }
    #infoCard.show { display: flex; }

    .info-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 3px 10px; border-radius: 20px; font-size: 0.65rem;
      font-family: 'Share Tech Mono', monospace; letter-spacing: 0.08em;
      text-transform: uppercase; width: fit-content;
      border: 1px solid; margin-bottom: 0.1rem;
    }
    .info-name-en {
      font-size: 1.1rem; font-weight: 700; color: var(--green); line-height: 1.2;
    }
    .info-name-bn {
      font-size: 0.9rem; color: rgba(104,211,145,0.7);
      font-family: 'Noto Serif Bengali', sans-serif;
    }
    .info-desc {
      font-size: 0.83rem; line-height: 1.72; color: rgba(200,230,210,0.82);
    }
    .info-desc-bn {
      font-size: 0.8rem; line-height: 1.78; color: rgba(200,230,210,0.65);
      font-family: 'Noto Serif Bengali', sans-serif;
    }
    .info-facts {
      background: rgba(0,0,0,0.35); border-radius: 8px;
      padding: 0.65rem 0.8rem; border-left: 2px solid var(--green);
    }
    .fact-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
      color: var(--dim); padding: 0.2rem 0;
      border-bottom: 1px solid rgba(104,211,145,0.06);
    }
    .fact-row:last-child { border-bottom: none; }
    .fact-val { color: var(--yellow); }
    .back-to-list {
      background: none; border: 1px solid rgba(104,211,145,0.2); color: var(--green);
      padding: 0.35rem 0.7rem; border-radius: 6px; font-size: 0.75rem;
      cursor: pointer; font-family: 'Share Tech Mono', monospace; transition: all 0.18s;
      width: fit-content;
    }
    .back-to-list:hover { background: rgba(104,211,145,0.1); }

    /* CELL CANVAS AREA */
    #cellArea {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; min-height: 0;
    }

    #cellSvg {
      max-width: 100%; max-height: 100%;
      width: 700px; height: 620px;
      filter: drop-shadow(0 0 40px rgba(104,211,145,0.12));
    }

    /* SVG organelle hover effects */
    .organelle {
      cursor: pointer;
      transition: filter 0.2s;
    }
    .organelle:hover { filter: brightness(1.4) drop-shadow(0 0 8px currentColor); }
    .organelle.active { filter: brightness(1.6) drop-shadow(0 0 14px currentColor); }

    /* Tooltip for mobile / quick label */
    #svgTooltip {
      position: absolute; pointer-events: none;
      background: rgba(4,18,12,0.95); border: 1px solid rgba(104,211,145,0.35);
      border-radius: 6px; padding: 5px 10px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
      color: var(--green); white-space: nowrap;
      opacity: 0; transition: opacity 0.15s;
      z-index: 50;
    }

    /* Cell type label */
    #cellTypeLabel {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(104,211,145,0.5);
      background: rgba(0,0,0,0.5); padding: 3px 12px; border-radius: 20px;
      border: 1px solid rgba(104,211,145,0.15);
    }

    /* Legend strip at bottom */
    #legend {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      background: rgba(0,0,0,0.55); border-radius: 8px; padding: 5px 12px;
      border: 1px solid rgba(104,211,145,0.1);
    }
    .leg-item {
      display: flex; align-items: center; gap: 4px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.55rem;
      color: rgba(200,230,210,0.6); letter-spacing: 0.04em; cursor: pointer;
    }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .hidden { display: none !important; }

    @media (max-width: 800px) {
      .main { flex-direction: column; }
      #infoPanel { width: 100%; min-width: auto; max-height: 220px; border-right: none; border-bottom: 1px solid rgba(104,211,145,0.12); }
      #cellSvg { width: 100%; height: auto; }
    }
  </style>
</head>
<body>
<div id="bgLayer"></div>
<div id="bgGrid"></div>
<div class="wrapper">

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="index.html" class="back-btn">← <span class="lang-en">Back</span><span class="lang-bn hidden">পিছনে</span></a>
    <div class="page-title">
      <span class="lang-en">🔬 Cell Biology</span>
      <span class="lang-bn hidden">🔬 কোষ জীববিজ্ঞান</span>
    </div>
    <div class="topbar-right">
      <button class="toggle-btn" id="cellToggle" onclick="toggleCell()">
        <span id="toggleLabel">🌿 Switch to Plant</span>
      </button>
      <button id="languageToggle" onclick="toggleLang()">বাংলা / EN</button>
    </div>
  </div>

  <div class="main">
    <!-- LEFT INFO PANEL -->
    <div id="infoPanel">
      <div class="info-header">
        <div style="font-family:'Share Tech Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(104,211,145,0.4);margin-bottom:0.3rem;">
          <span class="lang-en">Organelles</span><span class="lang-bn hidden">অঙ্গাণু</span>
        </div>
        <div id="cellTypeName" style="font-size:0.95rem;font-weight:700;color:var(--green);">Animal Cell</div>
      </div>

      <!-- Idle list -->
      <div class="info-idle" id="idleList">
        <div class="idle-hint lang-en">Hover or click an organelle</div>
        <div class="idle-hint lang-bn hidden">অঙ্গাণুতে হোভার বা ক্লিক করুন</div>
        <div class="organelle-list" id="orgList"></div>
      </div>

      <!-- Active info card -->
      <div id="infoCard">
        <button class="back-to-list" onclick="showIdle()">← <span class="lang-en">All organelles</span><span class="lang-bn hidden">সব অঙ্গাণু</span></button>
        <div>
          <div class="info-badge" id="infoBadge"></div>
          <div class="info-name-en lang-en" id="infoNameEn"></div>
          <div class="info-name-bn lang-bn hidden" id="infoNameBn"></div>
        </div>
        <div class="info-desc lang-en" id="infoDescEn"></div>
        <div class="info-desc-bn lang-bn hidden" id="infoDescBn"></div>
        <div class="info-facts" id="infoFacts"></div>
      </div>
    </div>

    <!-- CELL SVG AREA -->
    <div id="cellArea">
      <div id="cellTypeLabel">
        <span class="lang-en" id="ctLabelEn">Animal Cell — Eukaryote</span>
        <span class="lang-bn hidden" id="ctLabelBn">প্রাণী কোষ — ইউক্যারিওট</span>
      </div>

      <svg id="cellSvg" viewBox="0 0 700 620" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Cell membrane gradient - animal -->
          <radialGradient id="animalBg" cx="50%" cy="48%" r="50%">
            <stop offset="0%"   stop-color="#0d2a1a" stop-opacity="0.95"/>
            <stop offset="85%"  stop-color="#071a10" stop-opacity="0.98"/>
            <stop offset="100%" stop-color="#040f09" stop-opacity="1"/>
          </radialGradient>
          <!-- Plant cell background -->
          <radialGradient id="plantBg" cx="50%" cy="48%" r="50%">
            <stop offset="0%"   stop-color="#0a2010" stop-opacity="0.95"/>
            <stop offset="85%"  stop-color="#061808" stop-opacity="0.98"/>
            <stop offset="100%" stop-color="#030c04" stop-opacity="1"/>
          </radialGradient>
          <!-- Nucleus gradient -->
          <radialGradient id="nucGrad" cx="45%" cy="40%" r="55%">
            <stop offset="0%"   stop-color="#2d3080"/>
            <stop offset="100%" stop-color="#151840"/>
          </radialGradient>
          <!-- Nucleolus -->
          <radialGradient id="nucloGrad" cx="40%" cy="40%" r="60%">
            <stop offset="0%"   stop-color="#5060cc"/>
            <stop offset="100%" stop-color="#2535a0"/>
          </radialGradient>
          <!-- Mitochondria gradient -->
          <radialGradient id="mitoGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#7c3a1a"/>
            <stop offset="100%" stop-color="#3d1c0a"/>
          </radialGradient>
          <!-- Golgi gradient -->
          <linearGradient id="golgiGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#1a4a5a"/>
            <stop offset="100%" stop-color="#0d2a35"/>
          </linearGradient>
          <!-- Chloroplast gradient -->
          <radialGradient id="chloroGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#1a5c1a"/>
            <stop offset="100%" stop-color="#0a2e0a"/>
          </radialGradient>
          <!-- Vacuole gradient -->
          <radialGradient id="vacGrad" cx="40%" cy="40%" r="55%">
            <stop offset="0%"   stop-color="#0a2a3a"/>
            <stop offset="100%" stop-color="#051520"/>
          </radialGradient>
          <!-- Glow filter -->
          <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- ═══════════════ ANIMAL CELL GROUP ═══════════════ -->
        <g id="animalCell">
          <!-- Outer glow halo -->
          <ellipse cx="350" cy="305" rx="278" ry="256" fill="none" stroke="#68d391" stroke-width="1.5" stroke-opacity="0.08" filter="url(#softglow)"/>
          <!-- Cell membrane -->
          <ellipse class="organelle" id="a-membrane" cx="350" cy="305" rx="268" ry="248"
            fill="url(#animalBg)" stroke="#68d391" stroke-width="2.5" stroke-opacity="0.55"
            stroke-dasharray="6 3"
            onclick="selectOrg('cell_membrane')" data-key="cell_membrane"/>
          <!-- Cytoplasm label area -->

          <!-- ER Rough (wavy lines left side) -->
          <g class="organelle" id="a-rer" onclick="selectOrg('rer')" data-key="rer">
            <path d="M135,230 Q155,215 165,235 Q175,255 195,240 Q215,225 220,248 Q225,270 205,278 Q185,286 178,268 Q170,250 150,258 Q132,266 135,248 Z"
              fill="rgba(180,120,40,0.22)" stroke="#c8882c" stroke-width="1.5" stroke-opacity="0.7"/>
            <path d="M140,238 Q160,225 168,242" fill="none" stroke="#c8882c" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3 2"/>
            <path d="M148,255 Q168,242 175,260" fill="none" stroke="#c8882c" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3 2"/>
            <!-- Ribosomes on RER -->
            <circle cx="142" cy="238" r="3" fill="#e0a040" opacity="0.8"/>
            <circle cx="155" cy="232" r="3" fill="#e0a040" opacity="0.8"/>
            <circle cx="168" cy="238" r="3" fill="#e0a040" opacity="0.8"/>
            <circle cx="178" cy="248" r="3" fill="#e0a040" opacity="0.8"/>
            <circle cx="172" cy="262" r="3" fill="#e0a040" opacity="0.8"/>
          </g>

          <!-- ER Smooth -->
          <g class="organelle" id="a-ser" onclick="selectOrg('ser')" data-key="ser">
            <path d="M148,290 Q165,278 178,295 Q192,312 175,322 Q158,332 148,315 Q138,298 148,290 Z"
              fill="rgba(220,160,50,0.18)" stroke="#dba030" stroke-width="1.4" stroke-opacity="0.65"/>
          </g>

          <!-- Free ribosomes (scattered dots) -->
          <g class="organelle" id="a-ribosome" onclick="selectOrg('ribosome')" data-key="ribosome" opacity="0.85">
            <circle cx="240" cy="190" r="3.5" fill="#e8b840"/>
            <circle cx="270" cy="175" r="3.5" fill="#e8b840"/>
            <circle cx="430" cy="185" r="3.5" fill="#e8b840"/>
            <circle cx="460" cy="200" r="3.5" fill="#e8b840"/>
            <circle cx="490" cy="220" r="3.5" fill="#e8b840"/>
            <circle cx="500" cy="380" r="3.5" fill="#e8b840"/>
            <circle cx="220" cy="380" r="3.5" fill="#e8b840"/>
            <circle cx="200" cy="360" r="3.5" fill="#e8b840"/>
            <circle cx="255" cy="420" r="3.5" fill="#e8b840"/>
          </g>

          <!-- Golgi apparatus (stacked arcs) -->
          <g class="organelle" id="a-golgi" onclick="selectOrg('golgi')" data-key="golgi">
            <path d="M435,330 Q490,320 490,340 Q490,360 435,350 Z" fill="rgba(30,120,160,0.35)" stroke="#30a8d8" stroke-width="2" stroke-opacity="0.8"/>
            <path d="M440,348 Q498,337 498,358 Q498,378 440,368 Z" fill="rgba(30,120,160,0.3)" stroke="#30a8d8" stroke-width="1.8" stroke-opacity="0.7"/>
            <path d="M445,366 Q505,354 505,376 Q505,396 445,386 Z" fill="rgba(30,120,160,0.25)" stroke="#30a8d8" stroke-width="1.5" stroke-opacity="0.6"/>
            <path d="M450,384 Q508,372 508,394 Q508,414 450,404 Z" fill="rgba(30,120,160,0.2)" stroke="#30a8d8" stroke-width="1.3" stroke-opacity="0.55"/>
            <!-- Vesicles -->
            <circle cx="430" cy="340" r="7" fill="rgba(30,120,160,0.45)" stroke="#30a8d8" stroke-width="1.5"/>
            <circle cx="425" cy="358" r="6" fill="rgba(30,120,160,0.4)" stroke="#30a8d8" stroke-width="1.5"/>
            <circle cx="516" cy="355" r="8" fill="rgba(30,120,160,0.35)" stroke="#30a8d8" stroke-width="1.5"/>
            <circle cx="520" cy="380" r="6" fill="rgba(30,120,160,0.3)" stroke="#30a8d8" stroke-width="1.5"/>
          </g>

          <!-- Mitochondria (x3, different angles) -->
          <g class="organelle" id="a-mito" onclick="selectOrg('mitochondria')" data-key="mitochondria">
            <!-- Mito 1 -->
            <ellipse cx="410" cy="240" rx="40" ry="18" fill="url(#mitoGrad)" stroke="#e06020" stroke-width="2" stroke-opacity="0.75" transform="rotate(-20,410,240)"/>
            <path d="M376,230 Q390,240 376,250" fill="none" stroke="#e06020" stroke-width="1.2" stroke-opacity="0.5" transform="rotate(-20,410,240)"/>
            <path d="M386,225 Q400,240 386,255" fill="none" stroke="#e06020" stroke-width="1.2" stroke-opacity="0.5" transform="rotate(-20,410,240)"/>
            <path d="M396,222 Q410,240 396,258" fill="none" stroke="#e06020" stroke-width="1.2" stroke-opacity="0.5" transform="rotate(-20,410,240)"/>
            <!-- Mito 2 -->
            <ellipse cx="245" cy="430" rx="36" ry="15" fill="url(#mitoGrad)" stroke="#e06020" stroke-width="2" stroke-opacity="0.7" transform="rotate(15,245,430)"/>
            <path d="M214,425 Q224,432 214,439" fill="none" stroke="#e06020" stroke-width="1.2" stroke-opacity="0.5" transform="rotate(15,245,430)"/>
            <path d="M224,421 Q234,432 224,443" fill="none" stroke="#e06020" stroke-width="1.2" stroke-opacity="0.5" transform="rotate(15,245,430)"/>
            <!-- Mito 3 -->
            <ellipse cx="500" cy="450" rx="30" ry="13" fill="url(#mitoGrad)" stroke="#e06020" stroke-width="1.8" stroke-opacity="0.65" transform="rotate(-10,500,450)"/>
            <path d="M478,446 Q486,452 478,458" fill="none" stroke="#e06020" stroke-width="1" stroke-opacity="0.5" transform="rotate(-10,500,450)"/>
            <path d="M486,443 Q494,452 486,461" fill="none" stroke="#e06020" stroke-width="1" stroke-opacity="0.5" transform="rotate(-10,500,450)"/>
          </g>

          <!-- Lysosome (animal only) -->
          <g class="organelle" id="a-lyso" onclick="selectOrg('lysosome')" data-key="lysosome">
            <circle cx="460" cy="430" r="22" fill="rgba(200,50,90,0.25)" stroke="#e0305a" stroke-width="2" stroke-opacity="0.75"/>
            <circle cx="460" cy="430" r="14" fill="rgba(200,50,90,0.18)" stroke="#e0305a" stroke-width="1" stroke-opacity="0.4"/>
            <text x="460" y="435" text-anchor="middle" font-size="11" fill="#e0305a" opacity="0.7" font-family="Consolas">L</text>
          </g>

          <!-- Centriole (animal only) -->
          <g class="organelle" id="a-centriole" onclick="selectOrg('centriole')" data-key="centriole">
            <rect x="545" cy="280" x="538" y="275" width="22" height="10" rx="2" fill="rgba(150,180,220,0.3)" stroke="#90b4dc" stroke-width="1.5" stroke-opacity="0.8"/>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let cellType = 'animal'; // 'animal' | 'plant'
let lang = 'en';
let activeOrg = null;

// ═══════════════════════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════════════════════
function toggleLang() {
  lang = lang === 'en' ? 'bn' : 'en';
  document.querySelectorAll('.lang-en').forEach(el => el.classList.toggle('hidden', lang !== 'en'));
  document.querySelectorAll('.lang-bn').forEach(el => el.classList.toggle('hidden', lang !== 'bn'));
  document.body.classList.toggle('bangla', lang === 'bn');
}

// ═══════════════════════════════════════════════════════════════
// CELL TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleCell() {
  cellType = cellType === 'animal' ? 'plant' : 'animal';
  document.getElementById('animalCell').style.display = cellType === 'animal' ? '' : 'none';
  document.getElementById('plantCell').style.display  = cellType === 'plant'  ? '' : 'none';

  const lbl = document.getElementById('toggleLabel');
  if (cellType === 'animal') {
    lbl.textContent = '🌿 Switch to Plant';
    document.getElementById('cellToggle').classList.remove('animal');
    document.getElementById('cellTypeName').textContent = lang === 'en' ? 'Animal Cell' : 'প্রাণী কোষ';
    document.getElementById('ctLabelEn').textContent = 'Animal Cell — Eukaryote';
    document.getElementById('ctLabelBn').textContent = 'প্রাণী কোষ — ইউক্যারিওট';
  } else {
    lbl.textContent = '🐾 Switch to Animal';
    document.getElementById('cellToggle').classList.add('animal');
    document.getElementById('cellTypeName').textContent = lang === 'en' ? 'Plant Cell' : 'উদ্ভিদ কোষ';
    document.getElementById('ctLabelEn').textContent = 'Plant Cell — Eukaryote';
    document.getElementById('ctLabelBn').textContent = 'উদ্ভিদ কোষ — ইউক্যারিওট';
  }

  showIdle();
  buildList();
}

// ═══════════════════════════════════════════════════════════════
// ORGANELLE LIST
// ═══════════════════════════════════════════════════════════════
function buildList() {
  const list = document.getElementById('orgList');
  list.innerHTML = '';
  Object.entries(ORGANELLES).forEach(([key, org]) => {
    if (org.type !== 'both' && org.type !== cellType) return;
    const item = document.createElement('div');
    item.className = 'org-item';
    item.innerHTML = `
      <div class="org-dot" style="background:${org.color};box-shadow:0 0 5px ${org.color}55"></div>
      <div>
        <div class="org-name lang-en ${lang==='bn'?'hidden':''}">${org.nameEn}</div>
        <div class="org-name-bn lang-bn ${lang==='en'?'hidden':''}">${org.nameBn}</div>
      </div>`;
    item.onclick = () => selectOrg(key);
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════
// SHOW IDLE / SELECT
// ═══════════════════════════════════════════════════════════════
function showIdle() {
  document.getElementById('idleList').style.display = '';
  document.getElementById('infoCard').classList.remove('show');
  // Remove active from all organelles
  document.querySelectorAll('.organelle').forEach(el => el.classList.remove('active'));
  activeOrg = null;
}

function selectOrg(key) {
  const org = ORGANELLES[key];
  if (!org) return;
  activeOrg = key;

  // Highlight SVG element
  document.querySelectorAll('.organelle').forEach(el => el.classList.remove('active'));
  // Find by data-key
  document.querySelectorAll(`[data-key="${key}"]`).forEach(el => el.classList.add('active'));

  // Fill card
  document.getElementById('infoBadge').textContent = org.type === 'plant' ? '🌿 Plant only' : org.type === 'animal' ? '🐾 Animal only' : '🔬 Both cells';
  document.getElementById('infoBadge').style.cssText = `color:${org.color};border-color:${org.color}55;background:${org.color}11`;
  document.getElementById('infoNameEn').textContent = org.nameEn;
  document.getElementById('infoNameBn').textContent = org.nameBn;
  document.getElementById('infoDescEn').textContent = org.descEn;
  document.getElementById('infoDescBn').textContent = org.descBn;

  // Facts table
  const facts = document.getElementById('infoFacts');
  facts.innerHTML = org.facts.map(([k,v]) =>
    `<div class="fact-row"><span>${k}</span><span class="fact-val">${v}</span></div>`
  ).join('');

  document.getElementById('idleList').style.display = 'none';
  document.getElementById('infoCard').classList.add('show');
}

// ═══════════════════════════════════════════════════════════════
// SVG HOVER TOOLTIP
// ═══════════════════════════════════════════════════════════════
const tooltip = document.getElementById('svgTooltip');
document.getElementById('cellArea').addEventListener('mousemove', e => {
  tooltip.style.left = (e.offsetX + 14) + 'px';
  tooltip.style.top  = (e.offsetY - 10) + 'px';
});

document.querySelectorAll('.organelle').forEach(el => {
  el.addEventListener('mouseenter', () => {
    const key = el.dataset.key;
    const org = ORGANELLES[key];
    if (!org) return;
    tooltip.textContent = lang === 'en' ? org.nameEn : org.nameBn;
    tooltip.style.opacity = '1';
  });
  el.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
});

// ═══════════════════════════════════════════════════════════════
// BUILD LEGEND
// ═══════════════════════════════════════════════════════════════
function buildLegend() {
  const leg = document.getElementById('legend');
  const items = [
    { color: '#8090e0', label: 'Nucleus', labelBn: 'নিউক্লিয়াস' },
    { color: '#e06020', label: 'Mitochondria', labelBn: 'মাইটোকন্ড্রিয়া' },
    { color: '#30a8d8', label: 'Golgi', labelBn: 'গলজি' },
    { color: '#c8882c', label: 'ER', labelBn: 'অন্তঃজালিকা' },
    { color: '#40c840', label: 'Chloroplast', labelBn: 'ক্লোরোপ্লাস্ট' },
    { color: '#40a8d8', label: 'Vacuole', labelBn: 'ভ্যাকুওল' },
    { color: '#e0305a', label: 'Lysosome', labelBn: 'লাইসোসোম' },
  ];
  leg.innerHTML = items.map(i =>
    `<div class="leg-item">
      <div class="leg-dot" style="background:${i.color}"></div>
      <span class="lang-en ${lang==='bn'?'hidden':''}">${i.label}</span>
      <span class="lang-bn ${lang==='en'?'hidden':''}">${i.labelBn}</span>
    </div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildList();
buildLegend();
</script>
